name: Backend Matrix

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-matrix.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-matrix.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test:
    name: '${{ matrix.os }} / Python ${{ matrix.python-version }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022
          - windows-2025
        python-version:
          - '3.13'

    defaults:
      run:
        working-directory: backend

    env:
      APP_NAME: FHOS Core CI
      APP_VERSION: 2.0.0
      DEBUG: 'true'
      API_PREFIX: /api
      DATABASE_URL: sqlite:///./fhos_ci.db
      SECRET_KEY: ci-secret-key
      CORS_ORIGINS: '["*"]'
      OPENAI_API_KEY: ''
      ANTHROPIC_API_KEY: ''
      GEMINI_API_KEY: ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Import backend app smoke test
        run: |
          python -c "from app.main import app; print({'title': app.title, 'version': app.version})"

      - name: Run backend test suite
        run: python -m pytest
